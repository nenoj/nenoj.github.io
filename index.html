<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neno Jenciragic</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(160deg, #141430 0%, #0a0a1a 100%);
            color: #e0e0f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            text-align: center;
            padding: 60px 40px;
            max-width: 480px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        .tagline {
            font-size: 1rem;
            color: #8888aa;
            margin-bottom: 8px;
        }

        .location {
            font-size: 0.85rem;
            color: #555570;
            margin-bottom: 48px;
        }

        .links {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .links a {
            color: #90b4ff;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 8px 20px;
            border: 1px solid #90b4ff33;
            border-radius: 20px;
            transition: all 0.2s;
        }

        .links a:hover {
            background: #90b4ff18;
            border-color: #90b4ff88;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Neno Jenciragic</h1>
        <p class="tagline">Building things across finance, mobile, and AI</p>
        <p class="subtagline">
            C++ dev by day — FX exchange connectivity<br>
            iOS indie dev by night<br>
            Using AI to build faster
        </p>
        <p class="location">Toronto, ON</p>
        <div class="links">
            <a href="https://github.com/nenoj" target="_blank">GitHub</a>
            <a href="https://www.linkedin.com/in/nenojenciragic/" target="_blank">LinkedIn</a>
            <a href="https://apps.apple.com/app/quantum-dice/id6789195981" target="_blank">App Store</a>
        </div>
    </div>
</body>
</html>
